<!DOCTYPE html>

  <body>

    <h1>Epic dispatch quiz</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🤖 Who did robert canonically end up with in Dispatch?
        <select id="movie-answer">
          <option value="movie1">Visi</option>
          <option value="movie2">Toxic</option>
          <option value="movie3">Blazer</option>
          <option value="movie4">Flambae</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        🔥 What is the best ship in dispatch?
        <select id="book-answer">
          <option value="book1">Toxbert</option>
          <option value="book2">Invisiblaze/option>
          <option value="book3">Flambert</option>
          <option value="book4">All of the above</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <hr />
     <!-- Boo Question -->
    <form id="boo-form">
      <label>
        🧪 Who is the most underrated character in dispatch?
        <select id="boo-answer">
          <option value="boo1">Toxic</option>
          <option value="boo2">Waterboy</option>
          <option value="boo3">Phenomaman</option>
          <option value="boo4">Shroud</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="boo-result">
      <p id="boo-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
//============================

$("#movie-form").click(function () {
       $("img").animate({
          width:400,
          marginLeft: "0px"
       })
       $("h1").animate({
          width:400

       })
      });

      $("#book-form").click(function () {
       $("img").animate({
          width:200
       })
       $("h1").animate({
          width:200
       })
      });

      
      $("#boo-form").click(function () {
       $("img").animate({
          marginLeft: "200px"
       }, 1000);
      });
    
//===========================


      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie4") {
          $("#movie-text").text("YESSSS!");
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book4") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
      //=======================Book Question jQuery Code
      $("#boo-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#boo-answer");
        var answer = $answer.val();

        if (answer === "boo1") {
          $("#boo-text").text("YESSSS!");
        } 
        else {
          $("#boo-text").text("Try Again!");
        }
      });

    </script>
